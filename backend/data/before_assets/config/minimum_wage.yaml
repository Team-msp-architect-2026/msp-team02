# config/minimum_wage.yaml — 최저임금 설정
# 법령 개정 시 이 파일을 업데이트한다.
# 참고: https://www.minimumwage.go.kr

minimum_wage:
  # 적용 연도
  year: 2026

  # 시간급 최저임금 (원)
  # 2026년: 10,320원
  hourly: 10320

  # 월 환산 최저임금 (월 209시간 기준, 원)
  # 2026년: 10,320 × 209 = 2,156,880원
  monthly_209h: 2156880

  # 일급 환산 (8시간 기준)
  # 2026년: 10,320 × 8 = 82,560원
  daily_8h: 82560

  # 참고: 주 40시간 + 주휴 8시간 = 월 209시간 기준
  # 월 소정근로시간은 계약서마다 다를 수 있으므로 rule_validator.py 에서 재계산
