cards:
  screen_reader:
    kind: "right"
    title: "화면 접근성과 문서 접근성 조정을 요청할 수 있습니다"
    description: "스크린리더 호환, 고대비, 확대, 접근 가능한 문서 형식 제공은 정당한 편의의 대상이 될 수 있습니다."
    law_refs:
      - "장애인차별금지 및 권리구제 등에 관한 법률 제11조"
      - "장애인차별금지 및 권리구제 등에 관한 법률 시행령 제5조"
    action_hint: "업무에 사용하는 시스템과 문서 양식을 미리 확인해 두세요."
  communication_support:
    kind: "right"
    title: "문자 기반 소통 방식이나 자막 지원을 요청할 수 있습니다"
