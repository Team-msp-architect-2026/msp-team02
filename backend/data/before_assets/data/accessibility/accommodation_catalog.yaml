    title: "이동 동선과 작업 위치 조정을 요청할 수 있습니다"
    description: "출입 경로, 작업 위치, 책상 높이, 휴게 공간처럼 실제 근무 환경 조정을 회사에 요청할 수 있습니다."
    law_refs:
