cards:
  assistive_device_support:
    kind: "support"
    title: "보조공학기기 지원 여부를 확인해 보세요"
    description: "업무에 필요한 보조공학기기와 장비는 공적 지원 또는 사업주 지원과 연결될 수 있습니다."
    law_refs:
      - "장애인고용촉진 및 직업재활법 제18조"
      - "장애인고용촉진 및 직업재활법 시행령 제19조 [중복순번 3]"
    action_hint: "필요한 기기나 소프트웨어를 구체적으로 정리해 두면 협의가 쉬워집니다."
  workplace_assistant:
    kind: "support"
    title: "근로지원인 서비스 대상인지 확인해 보세요"
    description: "일부 중증장애인 근로자는 업무 수행을 돕는 근로지원인 서비스 대상이 될 수 있습니다."
    law_refs:
      - "장애인고용촉진 및 직업재활법 제19조 [중복순번 2]"
      - "장애인고용촉진 및 직업재활법 시행령 제20조 [중복순번 2]"
      - "장애인고용촉진 및 직업재활법 시행규칙 제7조 [중복순번 2]"
    action_hint: "업무 중 어떤 보조가 필요한지 구체적으로 적어 두면 신청 안내에 도움이 됩니다."
  employer_support:
    kind: "support"
    title: "사업주 지원과 고용관리 지도를 함께 활용할 수 있습니다"
    description: "사업주가 장비, 인력, 고용관리와 관련된 지원이나 지도를 받을 수 있어 조직 차원의 조정으로 이어질 수 있습니다."
    law_refs:
      - "장애인고용촉진 및 직업재활법 제20조"
      - "장애인고용촉진 및 직업재활법 제21조"
